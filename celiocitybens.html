<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CitybBens CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <style>
        .client-card { transition: all 0.2s ease; border-left: 4px solid transparent; cursor: pointer; }
        .client-card:hover { transform: translateX(2px); }
        .card-verde { background-color: #f0fdf4; border-left-color: #22c55e; }
        .card-amarelo { background-color: #fefce8; border-left-color: #eab308; }
        .card-vermelho { background-color: #fef2f2; border-left-color: #ef4444; }
        .card-cinza { background-color: #f3f4f6; border-left-color: #9ca3af; }
        .status-badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-verde { background-color: #dcfce7; color: #15803d; }
        .badge-amarelo { background-color: #fef9c3; color: #854d0e; }
        .badge-vermelho { background-color: #fee2e2; color: #b91c1c; }
        .badge-cinza { background-color: #e5e7eb; color: #374151; }
        .tab-btn-active { border-bottom-width: 2px; border-color: #2563eb; color: #1e40af; }
        .reminder-tab-active { border-bottom-width: 2px; border-color: #d97706; color: #b45309; }
        .modal { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

<div class="max-w-[1600px] mx-auto p-4 md:p-6">
    <!-- Cabeçalho com logo CitybBens -->
    <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
        <div class="flex items-center gap-3">
            <!-- Logo (troque a URL pela imagem real da Citybens) -->
            <img src="https://placehold.co/50x50/1e3a8a/white?text=CB" alt="CitybBens" class="w-12 h-12 rounded-xl shadow">
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800 tracking-tight">Cityb<span class="text-blue-700">Bens</span></h1>
            <span class="bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded-full">CRM Araçatuba-SP</span>
        </div>
        <div class="flex gap-3 items-center">
            <!-- Ícone de notificações com contador -->
            <div class="relative">
                <button id="notificationBell" class="text-gray-600 hover:text-gray-800 text-xl"><i class="fas fa-bell"></i></button>
                <span id="notificationCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 hidden">0</span>
            </div>
            <button id="resetBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg shadow-sm flex items-center gap-2"><i class="fas fa-database"></i> Restaurar Demo</button>
            <button id="openClientListBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg shadow-sm flex items-center gap-2"><i class="fas fa-users"></i> 📋 Clientes</button>
        </div>
    </div>

    <!-- Área principal -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Coluna principal: detalhes do cliente (ocupa mais espaço) -->
        <div class="lg:col-span-3 space-y-5">
            <!-- Painel do cliente selecionado -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="bg-gradient-to-r from-blue-800 to-blue-700 px-5 py-4 text-white flex justify-between items-center flex-wrap gap-2">
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 id="selectedClientName" class="text-xl font-bold">Nenhum cliente selecionado</h2>
                            <button id="editClientBtn" class="text-white/80 hover:text-white text-sm"><i class="fas fa-edit"></i> Editar</button>
                        </div>
                        <p id="selectedClientContact" class="text-blue-100 text-sm flex gap-3 mt-1"><span><i class="fas fa-phone-alt mr-1"></i> -</span> <span><i class="fas fa-envelope mr-1"></i> -</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button id="quickReminderBtn" class="bg-white/20 hover:bg-white/30 text-white text-sm px-3 py-1 rounded-md flex items-center gap-1"><i class="fas fa-calendar-plus"></i> Lembrar</button>
                    </div>
                </div>
                <!-- Tabs -->
                <div class="border-b border-gray-200 px-5 pt-3">
                    <div class="flex gap-6">
                        <button data-tab="history" class="tab-btn py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-700">📋 Histórico</button>
                        <button data-tab="quotas" class="tab-btn py-2 text-sm font-medium text-gray-500 hover:text-gray-700">💰 Cotas</button>
                    </div>
                </div>
                <div class="p-5">
                    <div id="historyTab" class="tab-content">
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-sm">
                                <thead class="bg-gray-100 text-gray-700">
                                    <tr><th class="px-3 py-2 text-left">Data</th><th class="px-3 py-2 text-left">Motivo</th><th class="px-3 py-2 text-left">Status</th><th class="px-3 py-2 text-left">Observações</th><th class="px-3 py-2 text-left">Ações</th></tr>
                                </thead>
                                <tbody id="historyTableBody"><tr><td colspan="5" class="text-center py-6 text-gray-400">Selecione um cliente</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                    <div id="quotasTab" class="tab-content hidden">
                        <div id="quotasInfo" class="space-y-3 text-gray-600">Selecione um cliente</div>
                        <button id="addQuotaBtn" class="mt-4 text-blue-600 text-sm flex items-center gap-1 hover:underline"><i class="fas fa-plus"></i> Adicionar cota</button>
                    </div>
                </div>
            </div>

            <!-- Nova interação -->
            <div class="bg-white rounded-xl shadow-md p-5">
                <h3 class="font-semibold text-gray-800 mb-3"><i class="fas fa-pen-alt text-blue-600"></i> Nova Interação / Agendar Retorno</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="newMotivo" placeholder="Motivo" class="border rounded-lg px-3 py-2 text-sm">
                    <textarea id="newObs" rows="1" placeholder="Observações" class="border rounded-lg px-3 py-2 text-sm"></textarea>
                    <input type="date" id="newRetornoDate" class="border rounded-lg px-3 py-2 text-sm">
                    <button id="saveInteractionBtn" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2 text-sm font-medium"><i class="fas fa-save"></i> Salvar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: LISTA DE CLIENTES -->
<div id="clientModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">📋 Selecione ou edite um cliente</h3>
            <button id="closeClientModal" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div class="mb-4">
            <input type="text" id="searchClientModal" placeholder="Filtrar cliente..." class="w-full border rounded-lg px-3 py-2">
        </div>
        <div id="clientModalList" class="space-y-2 max-h-96 overflow-y-auto"></div>
        <div class="mt-4 flex justify-end">
            <button id="newClientFromModal" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg"><i class="fas fa-user-plus"></i> Novo Cliente</button>
        </div>
    </div>
</div>

<!-- Modal de Edição de Cliente -->
<div id="editClientModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6">
        <h3 class="text-xl font-bold mb-4">Editar Cliente</h3>
        <div class="space-y-3">
            <input type="text" id="editClientName" placeholder="Nome" class="w-full border rounded-lg p-2">
            <input type="text" id="editClientPhone" placeholder="Telefone" class="w-full border rounded-lg p-2">
            <input type="email" id="editClientEmail" placeholder="E-mail" class="w-full border rounded-lg p-2">
            <button id="confirmEditClientBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg">Salvar</button>
        </div>
    </div>
</div>

<!-- Modal de Edição de Interação -->
<div id="editInteractionModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6">
        <h3 class="text-xl font-bold mb-4">Editar Interação</h3>
        <div class="space-y-3">
            <input type="date" id="editInteractionDate" class="w-full border rounded-lg p-2">
            <input type="text" id="editInteractionMotivo" placeholder="Motivo" class="w-full border rounded-lg p-2">
            <select id="editInteractionStatus" class="w-full border rounded-lg p-2">
                <option value="🟢 NO PRAZO">🟢 NO PRAZO</option>
                <option value="🟡 PARA HOJE">🟡 PARA HOJE</option>
                <option value="🔴 ATRASADO">🔴 ATRASADO</option>
                <option value="CONCLUÍDO">✅ CONCLUÍDO</option>
            </select>
            <textarea id="editInteractionObs" rows="2" placeholder="Observações" class="w-full border rounded-lg p-2"></textarea>
            <input type="date" id="editInteractionRetorno" placeholder="Data retorno" class="w-full border rounded-lg p-2">
            <button id="saveInteractionEditBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg">Atualizar</button>
        </div>
    </div>
</div>

<!-- Modal de Lembrete Rápido -->
<div id="reminderModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6">
        <h3 class="text-xl font-bold mb-4">Novo Lembrete</h3>
        <div class="space-y-3">
            <select id="modalClientSelect" class="w-full border rounded-lg p-2"></select>
            <input type="date" id="modalReminderDate" class="w-full border rounded-lg p-2">
            <textarea id="modalReminderDesc" rows="2" placeholder="Descrição" class="w-full border rounded-lg p-2"></textarea>
            <button id="confirmReminderBtn" class="w-full bg-amber-600 text-white py-2 rounded-lg">Criar</button>
        </div>
    </div>
</div>

<script>
    // Inicializa notificações
    const notyf = new Notyf({ duration: 5000, position: { x: 'right', y: 'top' }, dismissible: true });
    let clientsData = {};
    let reminders = [];
    let currentSelectedClient = null;
    let editInteractionIndex = null;

    // Helper: prioridade
    function getPriority(status) {
        if (!status) return "cinza";
        const s = status.toString().toLowerCase();
        if (s.includes("atrasado") || s.includes("🔴")) return "vermelho";
        if (s.includes("prazo") || s.includes("verde") || s.includes("🟢")) return "verde";
        if (s.includes("hoje") || s.includes("amarelo") || s.includes("🟡")) return "amarelo";
        return "cinza";
    }
    function getCardClass(status) { const p = getPriority(status); if(p==="verde") return "card-verde"; if(p==="amarelo") return "card-amarelo"; if(p==="vermelho") return "card-vermelho"; return "card-cinza"; }
    function getBadgeClass(status) { const p = getPriority(status); if(p==="verde") return "badge-verde"; if(p==="amarelo") return "badge-amarelo"; if(p==="vermelho") return "badge-vermelho"; return "badge-cinza"; }

    // Persistência
    function persist() { localStorage.setItem("citybens_crm", JSON.stringify({ clientsData, reminders })); }
    function loadLocal() {
        const saved = localStorage.getItem("citybens_crm");
        if(saved) { try { const d=JSON.parse(saved); clientsData=d.clientsData; reminders=d.reminders||[]; return true; } catch(e){} }
        return false;
    }

    // Demo inicial
    function loadDemo() {
        clientsData = {};
        const demo = [
            { nome:"ALON NUSSBACHER", tel:"(11) 99999-1111", email:"alon@email.com", grupo:743, cota:369, motivo:"Reemitir boleto", data:"2026-05-14", retorno:"2026-05-20", status:"🟢 NO PRAZO", obs:"" },
            { nome:"ALON NUSSBACHER", tel:"(11) 99999-1111", email:"alon@email.com", grupo:7023, cota:236, motivo:"Parcela vencida", data:"2026-05-10", retorno:"2026-05-11", status:"🔴 ATRASADO", obs:"Urgente" },
            { nome:"CITYBENS", tel:"(11) 2222-3333", email:"city@bens.com", grupo:7030, cota:251, motivo:"Regularizar", data:"2026-05-14", retorno:"2026-05-11", status:"🔴 ATRASADO", obs:"" },
            { nome:"Nossa Casa", tel:"31-991582006", email:"contato@nossacasa.com", grupo:6015, cota:56, motivo:"Ajuste débito", data:"2026-05-13", retorno:"2026-06-15", status:"🟢 NO PRAZO", obs:"" }
        ];
        demo.forEach(d=>{
            if(!clientsData[d.nome]) clientsData[d.nome]={ contatos:[], quotas:[], telefone:d.tel, email:d.email };
            clientsData[d.nome].contatos.push({ id:Date.now()+Math.random(), dataContato:d.data, motivo:d.motivo, statusRetorno:d.status, observacoes:d.obs, dataRetornoPrev:d.retorno });
            clientsData[d.nome].quotas.push({ grupo:d.grupo, cota:d.cota, info:"", status:d.status });
        });
        reminders = [];
        for(let c in clientsData){
            clientsData[c].contatos.forEach(ct => {
                if(ct.dataRetornoPrev && ct.dataRetornoPrev!="") reminders.push({ id:Date.now()+Math.random(), clientName:c, dueDate:ct.dataRetornoPrev, description:ct.motivo?.substring(0,60) });
            });
        }
    }

    // Renderizar lista no modal
    function renderClientModalList(filter=""){
        const container = document.getElementById("clientModalList");
        const names = Object.keys(clientsData).sort();
        const filtered = filter ? names.filter(n=>n.toLowerCase().includes(filter.toLowerCase())) : names;
        if(!filtered.length) { container.innerHTML = "<div class='text-center text-gray-400'>Nenhum cliente</div>"; return; }
        container.innerHTML = filtered.map(c=>{
            const last = clientsData[c].contatos.length? clientsData[c].contatos[clientsData[c].contatos.length-1].statusRetorno : null;
            const cardClass = getCardClass(last);
            return `<div class="client-modal-item p-3 rounded-lg cursor-pointer flex justify-between items-center ${cardClass} border" data-client="${escapeHtml(c)}">
                        <span><i class="fas fa-user"></i> ${escapeHtml(c)}</span>
                        <button class="edit-client-modal text-blue-500 hover:text-blue-700" data-client="${escapeHtml(c)}"><i class="fas fa-edit"></i></button>
                    </div>`;
        }).join("");
        document.querySelectorAll('.client-modal-item').forEach(el=>{
            el.addEventListener('click', (e)=>{
                if(e.target.closest('.edit-client-modal')) return;
                const name = el.getAttribute('data-client');
                if(name) { selectClient(name); document.getElementById("clientModal").classList.add("hidden"); }
            });
        });
        document.querySelectorAll('.edit-client-modal').forEach(btn=>{
            btn.addEventListener('click', (e)=>{
                e.stopPropagation();
                const name = btn.getAttribute('data-client');
                openEditClientModal(name);
            });
        });
    }

    // Selecionar cliente e atualizar tela principal
    function selectClient(name){
        currentSelectedClient = name;
        const client = clientsData[name];
        if(!client) return;
        document.getElementById("selectedClientName").innerText = name;
        document.getElementById("selectedClientContact").innerHTML = `<span><i class="fas fa-phone-alt"></i> ${client.telefone||'-'}</span> <span><i class="fas fa-envelope"></i> ${client.email||'-'}</span>`;
        // histórico
        const tbody = document.getElementById("historyTableBody");
        if(!client.contatos.length) tbody.innerHTML = '<tr><td colspan="5" class="text-center py-6">Sem histórico</td></tr>';
        else {
            tbody.innerHTML = client.contatos.map((c,idx)=>`
                <tr class="border-b">
                    <td class="px-3 py-2">${c.dataContato||'-'}</td>
                    <td class="px-3 py-2">${escapeHtml(c.motivo)||'-'}</td>
                    <td class="px-3 py-2"><span class="status-badge ${getBadgeClass(c.statusRetorno)}">${c.statusRetorno||'-'}</span></td>
                    <td class="px-3 py-2">${escapeHtml(c.observacoes)||'-'}</td>
                    <td class="px-3 py-2"><button class="edit-interaction-btn text-blue-500" data-idx="${idx}"><i class="fas fa-edit"></i></button></td>
                </tr>
            `).join('');
        }
        // cotas
        const quotasDiv = document.getElementById("quotasInfo");
        if(client.quotas?.length){
            quotasDiv.innerHTML = `<div class="grid md:grid-cols-2 gap-3">${client.quotas.map((q,idx)=>`
                <div class="border p-3 rounded relative bg-gray-50">
                    <button class="edit-quota-btn absolute top-2 right-2 text-blue-500" data-idx="${idx}"><i class="fas fa-edit"></i></button>
                    <div class="font-bold">Grupo ${q.grupo || '-'} - Cota ${q.cota || '-'}</div>
                    <div><span class="status-badge ${getBadgeClass(q.status)}">${q.status||'Pendente'}</span></div>
                    <div class="text-xs text-gray-600">${escapeHtml(q.info||'')}</div>
                </div>
            `).join('')}</div>`;
        } else quotasDiv.innerHTML = '<p>Nenhuma cota</p>';
        // reatach eventos
        document.querySelectorAll('.edit-interaction-btn').forEach(btn=>btn.addEventListener('click',()=>openEditInteractionModal(parseInt(btn.dataset.idx))));
        document.querySelectorAll('.edit-quota-btn').forEach(btn=>btn.addEventListener('click',()=>openEditQuotaModal(parseInt(btn.dataset.idx))));
    }

    function openEditClientModal(clientName){
        const c = clientsData[clientName];
        if(!c) return;
        document.getElementById("editClientName").value = clientName;
        document.getElementById("editClientPhone").value = c.telefone||"";
        document.getElementById("editClientEmail").value = c.email||"";
        const modal = document.getElementById("editClientModal");
        modal.classList.remove("hidden");
        const btn = document.getElementById("confirmEditClientBtn");
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click',()=>{
            const newName = document.getElementById("editClientName").value.trim();
            if(!newName) { notyf.error("Nome obrigatório"); return; }
            if(newName !== clientName){
                clientsData[newName] = {...c};
                delete clientsData[clientName];
                reminders.forEach(r=>{ if(r.clientName===clientName) r.clientName=newName; });
                if(currentSelectedClient===clientName) currentSelectedClient=newName;
            }
            clientsData[newName].telefone = document.getElementById("editClientPhone").value;
            clientsData[newName].email = document.getElementById("editClientEmail").value;
            persist();
            renderClientModalList(document.getElementById("searchClientModal").value);
            if(currentSelectedClient) selectClient(currentSelectedClient);
            modal.classList.add("hidden");
            notyf.success("Cliente atualizado");
        });
    }

    function openEditInteractionModal(idx){
        if(!currentSelectedClient) return;
        const inter = clientsData[currentSelectedClient].contatos[idx];
        if(!inter) return;
        editInteractionIndex = idx;
        document.getElementById("editInteractionDate").value = inter.dataContato||"";
        document.getElementById("editInteractionMotivo").value = inter.motivo||"";
        document.getElementById("editInteractionStatus").value = inter.statusRetorno||"🟢 NO PRAZO";
        document.getElementById("editInteractionObs").value = inter.observacoes||"";
        document.getElementById("editInteractionRetorno").value = inter.dataRetornoPrev||"";
        const modal = document.getElementById("editInteractionModal");
        modal.classList.remove("hidden");
        const saveBtn = document.getElementById("saveInteractionEditBtn");
        const newSave = saveBtn.cloneNode(true);
        saveBtn.parentNode.replaceChild(newSave, saveBtn);
        newSave.addEventListener('click',()=>{
            inter.dataContato = document.getElementById("editInteractionDate").value;
            inter.motivo = document.getElementById("editInteractionMotivo").value;
            inter.statusRetorno = document.getElementById("editInteractionStatus").value;
            inter.observacoes = document.getElementById("editInteractionObs").value;
            inter.dataRetornoPrev = document.getElementById("editInteractionRetorno").value;
            // atualiza lembrete
            reminders = reminders.filter(r=> !(r.clientName===currentSelectedClient && r.dueDate===inter.dataRetornoPrev && r.description===inter.motivo?.substring(0,60)));
            if(inter.dataRetornoPrev && inter.dataRetornoPrev!=="") reminders.push({ id:Date.now(), clientName:currentSelectedClient, dueDate:inter.dataRetornoPrev, description:inter.motivo?.substring(0,60) });
            persist();
            selectClient(currentSelectedClient);
            checkAndNotify();
            modal.classList.add("hidden");
            notyf.success("Interação atualizada");
        });
    }
    function openEditQuotaModal(idx){
        if(!currentSelectedClient) return;
        const q = clientsData[currentSelectedClient].quotas[idx];
        const newGrupo = prompt("Grupo:", q.grupo); if(newGrupo!==null) q.grupo = newGrupo;
        const newCota = prompt("Cota:", q.cota); if(newCota!==null) q.cota = newCota;
        const newStatus = prompt("Status:", q.status); if(newStatus!==null) q.status = newStatus;
        const newInfo = prompt("Info:", q.info); if(newInfo!==null) q.info = newInfo;
        persist();
        selectClient(currentSelectedClient);
        notyf.success("Cota atualizada");
    }

    // Notificações de vencimento
    function checkAndNotify(){
        const today = new Date(); today.setHours(0,0,0,0);
        let alerts = 0;
        reminders.forEach(r=>{
            const due = new Date(r.dueDate);
            due.setHours(0,0,0,0);
            if(due < today) { alerts++; notyf.error({ message: `🔴 ATRASADO: ${r.clientName} - ${r.description}`, duration: 8000 }); }
            else if(due.getTime() === today.getTime()) { alerts++; notyf.warning({ message: `⚠️ HOJE: ${r.clientName} - ${r.description}`, duration: 8000 }); }
        });
        const countSpan = document.getElementById("notificationCount");
        if(alerts>0){ countSpan.innerText = alerts; countSpan.classList.remove("hidden"); }
        else countSpan.classList.add("hidden");
    }

    // Adicionar interação
    function addInteraction(client, motivo, obs, retorno){
        const c = clientsData[client];
        if(!c) return;
        const newInt = { id:Date.now(), dataContato:new Date().toISOString().slice(0,10), motivo:motivo||"Contato", statusRetorno:retorno?"🟡 AGENDADO":"Sem Data", observacoes:obs||"", dataRetornoPrev:retorno||"" };
        c.contatos.unshift(newInt);
        if(retorno) reminders.push({ id:Date.now(), clientName:client, dueDate:retorno, description:motivo?.substring(0,60)||"Retorno" });
        persist();
        selectClient(client);
        checkAndNotify();
    }

    function addNewClientGlobal(){
        let name = prompt("Nome do novo cliente:");
        if(!name) return;
        name = name.trim();
        if(clientsData[name]) { notyf.error("Cliente já existe"); return; }
        clientsData[name] = { contatos:[], quotas:[], telefone:"", email:"" };
        persist();
        renderClientModalList(document.getElementById("searchClientModal").value);
        selectClient(name);
        notyf.success("Cliente criado");
    }

    function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Eventos e inicialização
    document.addEventListener("DOMContentLoaded",()=>{
        if(!loadLocal()) loadDemo();
        persist();
        renderClientModalList("");
        if(Object.keys(clientsData).length) selectClient(Object.keys(clientsData)[0]);
        checkAndNotify();
        setInterval(checkAndNotify, 60000);

        document.getElementById("openClientListBtn").addEventListener("click",()=>{
            renderClientModalList(document.getElementById("searchClientModal").value);
            document.getElementById("clientModal").classList.remove("hidden");
        });
        document.getElementById("closeClientModal").addEventListener("click",()=>document.getElementById("clientModal").classList.add("hidden"));
        document.getElementById("searchClientModal").addEventListener("input",(e)=>renderClientModalList(e.target.value));
        document.getElementById("newClientFromModal").addEventListener("click",addNewClientGlobal);
        document.getElementById("resetBtn").addEventListener("click",()=>{ loadDemo(); persist(); renderClientModalList(""); if(Object.keys(clientsData).length) selectClient(Object.keys(clientsData)[0]); checkAndNotify(); notyf.success("Demo restaurada"); });
        document.getElementById("editClientBtn").addEventListener("click",()=>{ if(currentSelectedClient) openEditClientModal(currentSelectedClient); else notyf.error("Selecione um cliente"); });
        document.getElementById("addQuotaBtn").addEventListener("click",()=>{ if(currentSelectedClient){ clientsData[currentSelectedClient].quotas.push({ grupo:"", cota:"", info:"", status:"🟢 NO PRAZO" }); persist(); selectClient(currentSelectedClient); notyf.success("Nova cota adicionada"); } else notyf.error("Selecione um cliente"); });
        document.getElementById("saveInteractionBtn").addEventListener("click",()=>{ if(!currentSelectedClient){ notyf.error("Selecione um cliente"); return; } const motivo=document.getElementById("newMotivo").value, obs=document.getElementById("newObs").value, retorno=document.getElementById("newRetornoDate").value; addInteraction(currentSelectedClient,motivo,obs,retorno); document.getElementById("newMotivo").value=""; document.getElementById("newObs").value=""; document.getElementById("newRetornoDate").value=""; });
        document.getElementById("quickReminderBtn").addEventListener("click",()=>{ if(currentSelectedClient){ const select=document.getElementById("modalClientSelect"); select.innerHTML=Object.keys(clientsData).map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join(''); document.getElementById("modalClientSelect").value=currentSelectedClient; document.getElementById("reminderModal").classList.remove("hidden"); } else notyf.error("Selecione um cliente"); });
        document.getElementById("confirmReminderBtn").addEventListener("click",()=>{ const cli=document.getElementById("modalClientSelect").value, date=document.getElementById("modalReminderDate").value, desc=document.getElementById("modalReminderDesc").value; if(!cli||!date){ notyf.error("Preencha cliente e data"); return; } reminders.push({ id:Date.now(), clientName:cli, dueDate:date, description:desc||"Manual" }); persist(); checkAndNotify(); document.getElementById("reminderModal").classList.add("hidden"); notyf.success("Lembrete criado"); });
        // Fechar modais
        document.querySelectorAll("#editClientModal #closeEditModal, #editInteractionModal .close, .modal-close").forEach(el=>{ if(el) el.addEventListener("click",()=>document.getElementById("editClientModal").classList.add("hidden")); });
        window.addEventListener("click",(e)=>{ if(e.target.classList.contains("fixed")){ document.getElementById("clientModal").classList.add("hidden"); document.getElementById("editClientModal").classList.add("hidden"); document.getElementById("editInteractionModal").classList.add("hidden"); document.getElementById("reminderModal").classList.add("hidden"); } });
        // Tabs
        document.querySelectorAll(".tab-btn").forEach(btn=>{ btn.addEventListener("click",()=>{ const tab=btn.dataset.tab; document.querySelectorAll(".tab-content").forEach(t=>t.classList.add("hidden")); document.getElementById(tab+"Tab").classList.remove("hidden"); document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("tab-btn-active")); btn.classList.add("tab-btn-active"); }); });
    });
</script>
</body>
</html>
